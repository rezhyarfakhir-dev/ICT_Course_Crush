name: Data Integrity Checks

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  data-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run climate data integrity checks
        run: node scripts/run-data-checks.mjs
