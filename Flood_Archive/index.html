<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Global Flood Archive Map</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <style>
    :root{--bg-top:#f4f8ef;--bg-mid:#e4efe1;--ink:#12212b;--muted:#4e5f6c;--panel:#fff;--line:#c9d6dc;--accent:#00695c;--accent-soft:#e1f3ee}
    *{box-sizing:border-box}
    body{margin:0;font-family:"IBM Plex Sans",sans-serif;color:var(--ink);background:linear-gradient(180deg,var(--bg-top),var(--bg-mid))}
    .layout{min-height:100vh;display:grid;grid-template-rows:auto auto 1fr}
    .banner{padding:18px 18px 14px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.82);backdrop-filter:blur(6px);animation:slideIn 320ms ease}
    @keyframes slideIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
    .top-row{display:grid;grid-template-columns:1fr minmax(220px,420px);gap:14px;align-items:end}
    h1{margin:0;font-family:"Space Grotesk",sans-serif;font-size:clamp(1.1rem,2.6vw,1.9rem);letter-spacing:-.02em;font-weight:700}
    .subtitle{margin-top:6px;font-size:.93rem;color:var(--muted)}
    .search-wrap{display:grid;gap:6px}
    .search-label{font-size:.8rem;color:var(--muted);font-weight:600}
    .search-input{width:100%;border:1px solid var(--line);border-radius:12px;padding:11px 12px;font-size:.96rem;background:#fff;color:var(--ink);outline:none;transition:border-color 150ms,box-shadow 150ms}
    .search-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px #d6ece6}
    .stats{margin-top:10px;display:flex;gap:8px;flex-wrap:wrap}
    .pill{border:1px solid var(--line);background:var(--panel);border-radius:999px;padding:6px 10px;font-size:.83rem;color:#31424d}
    .filters{display:grid;grid-template-columns:repeat(5,minmax(130px,1fr));gap:10px;padding:12px 18px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.76);animation:slideIn 400ms ease}
    .field{display:grid;gap:6px}
    label{font-size:.75rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.02em}
    select,button{border:1px solid var(--line);border-radius:10px;padding:9px 10px;font-size:.9rem;background:#fff;color:var(--ink);font-family:inherit}
    button{border-color:#b8c8cf;background:var(--accent-soft);color:#0d3f38;font-weight:600;cursor:pointer}
    button:hover{filter:brightness(.98)}
    #map{width:100%;min-height:460px;height:calc(100vh - 212px)}
    .legend{background:#fff;border:1px solid #d4dde1;border-radius:10px;padding:8px;font-size:12px;line-height:1.35;color:#2e3a43}
    .dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:6px;transform:translateY(1px)}
    @media(max-width:980px){.top-row{grid-template-columns:1fr}.filters{grid-template-columns:repeat(2,minmax(130px,1fr))}#map{height:calc(100vh - 324px)}}
    @media(max-width:560px){.filters{grid-template-columns:1fr}#map{height:calc(100vh - 515px)}}
  </style>
</head>
<body>
<div class="layout">
  <section class="banner">
    <div class="top-row">
      <div>
        <h1 id="headline">Global Active Archive of Large Flood Events</h1>
        <div class="subtitle">5,130 flood events worldwide (1985–2021) &middot; Dartmouth Flood Observatory (DFO) &middot; Search, filter, and explore.</div>
      </div>
      <div class="search-wrap">
        <label class="search-label" for="searchInput">Search</label>
        <input id="searchInput" class="search-input" type="search" placeholder="Search by country, cause, validation source..." />
      </div>
    </div>
    <div class="stats">
      <span class="pill" id="totalStat">Total: 0</span>
      <span class="pill" id="shownStat">Shown: 0</span>
      <span class="pill" id="countryStat">Countries: 0</span>
      <span class="pill" id="deadStat">Deaths: 0</span>
      <span class="pill" id="displStat">Displaced: 0</span>
    </div>
  </section>
  <section class="filters">
    <div class="field"><label for="countryFilter">Country</label><select id="countryFilter"><option value="all">All</option></select></div>
    <div class="field"><label for="causeFilter">Cause</label><select id="causeFilter"><option value="all">All</option></select></div>
    <div class="field"><label for="severityFilter">Severity</label><select id="severityFilter"><option value="all">All</option></select></div>
    <div class="field"><label for="yearFilter">Year</label><select id="yearFilter"><option value="all">All</option></select></div>
    <div class="field"><label>&nbsp;</label><button id="resetFilters" type="button">Reset Filters</button></div>
  </section>
  <div id="map" aria-label="Global flood archive map"></div>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script>
const map=L.map("map",{zoomControl:true}).setView([20,0],2);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:19,attribution:"&copy; OpenStreetMap contributors"}).addTo(map);
const markerLayer=L.layerGroup().addTo(map);
const state={allFeatures:[],shownFeatures:[]};
const severityColor=s=>{s=String(s||"").toLowerCase();if(s==="very high")return"#bf360c";if(s==="high")return"#f57f17";if(s==="medium")return"#f9a825";if(s==="low")return"#2e7d32";return"#546e7a"};
function uniqueSorted(v){return[...new Set(v.filter(x=>x&&String(x).trim()))].map(String).sort((a,b)=>a.localeCompare(b))}
function fillSelect(el,v){const c=el.value||"all";el.innerHTML='<option value="all">All</option>';v.forEach(x=>{const o=document.createElement("option");o.value=x;o.textContent=x;el.appendChild(o)});if([...el.options].some(o=>o.value===c))el.value=c}
function fmt(n){return n!=null?Number(n).toLocaleString():"n/a"}
(function(){const lg=L.control({position:"bottomright"});lg.onAdd=function(){const d=L.DomUtil.create("div","legend");d.innerHTML='<strong>Severity</strong><div><span class="dot" style="background:#bf360c"></span>Very high (\u2265 2)</div><div><span class="dot" style="background:#f57f17"></span>High (1.5\u20132)</div><div><span class="dot" style="background:#f9a825"></span>Medium (1\u20131.5)</div><div><span class="dot" style="background:#2e7d32"></span>Low (&lt; 1)</div>';return d};lg.addTo(map)})();

function matchesSearch(f,t){if(!t)return true;const p=f.properties||{};return[p.country,p.other_country,p.cause,p.severity,p.validation,p.glide_number].filter(Boolean).join(" ").toLowerCase().includes(t)}
function applyFilters(){
  const search=document.getElementById("searchInput").value.trim().toLowerCase();
  const country=document.getElementById("countryFilter").value;
  const cause=document.getElementById("causeFilter").value;
  const severity=document.getElementById("severityFilter").value;
  const year=document.getElementById("yearFilter").value;
  state.shownFeatures=state.allFeatures.filter(f=>{
    const p=f.properties||{};
    if(!matchesSearch(f,search))return false;
    if(country!=="all"&&p.country!==country)return false;
    if(cause!=="all"&&p.cause!==cause)return false;
    if(severity!=="all"&&p.severity!==severity)return false;
    if(year!=="all"&&(p.began||"").slice(0,4)!==year)return false;
    return true;
  });
  renderMarkers();updateStats();
}
function renderMarkers(){
  markerLayer.clearLayers();
  if(!state.shownFeatures.length)return;
  const bounds=[];
  state.shownFeatures.forEach(f=>{
    const c=f.geometry&&f.geometry.coordinates;if(!c||c.length<2)return;
    const lon=+c[0],lat=+c[1];if(!isFinite(lat)||!isFinite(lon))return;
    bounds.push([lat,lon]);
    const p=f.properties||{};
    const m=L.circleMarker([lat,lon],{radius:Math.max(4,Math.min(10,(p.severity_raw||1)*4)),color:"#21343f",weight:1,fillColor:severityColor(p.severity),fillOpacity:.85});
    m.bindPopup('<strong>'+( p.country||"Unknown")+'</strong>'+(p.other_country?'<div>Also: '+p.other_country+'</div>':'')+'<hr style="margin:4px 0;border:none;border-top:1px solid #ddd">'+'<div>Cause: '+(p.cause||'n/a')+'</div>'+'<div>Severity: '+(p.severity||'n/a')+' ('+fmt(p.severity_raw)+')</div>'+'<div>Dead: '+fmt(p.dead)+' &middot; Displaced: '+fmt(p.displaced)+'</div>'+'<div>Area: '+fmt(p.affected_sqkm)+' km\u00B2</div>'+'<div>Duration: '+fmt(p.duration_days)+' days</div>'+'<div>'+(p.began||'?')+' \u2192 '+(p.ended||'?')+'</div>'+'<div style="margin-top:4px;font-size:.85em;color:#666">Source: '+(p.validation||'n/a')+(p.glide_number?' &middot; GLIDE: '+p.glide_number:'')+'</div>',{maxWidth:320});
    markerLayer.addLayer(m);
  });
  if(bounds.length)map.fitBounds(bounds,{padding:[30,30],maxZoom:6});
}
function updateStats(){
  const total=state.allFeatures.length,shown=state.shownFeatures;
  const countries=uniqueSorted(shown.map(f=>(f.properties||{}).country));
  const dead=shown.reduce((s,f)=>s+((f.properties||{}).dead||0),0);
  const disp=shown.reduce((s,f)=>s+((f.properties||{}).displaced||0),0);
  document.getElementById("totalStat").textContent="Total: "+total.toLocaleString();
  document.getElementById("shownStat").textContent="Shown: "+shown.length.toLocaleString();
  document.getElementById("countryStat").textContent="Countries: "+countries.length;
  document.getElementById("deadStat").textContent="Deaths: "+dead.toLocaleString();
  document.getElementById("displStat").textContent="Displaced: "+disp.toLocaleString();
  document.getElementById("headline").textContent=shown.length?shown.length.toLocaleString()+" flood events match current filters":"No flood events match your current filters";
}
["searchInput","countryFilter","causeFilter","severityFilter","yearFilter"].forEach(id=>{const el=document.getElementById(id);el.addEventListener("input",applyFilters);el.addEventListener("change",applyFilters)});
document.getElementById("resetFilters").addEventListener("click",()=>{document.getElementById("searchInput").value="";["countryFilter","causeFilter","severityFilter","yearFilter"].forEach(id=>document.getElementById(id).value="all");applyFilters()});

(async function(){
  try{
    const res=await fetch("./data/floodarchive.geojson",{cache:"no-store"});
    if(!res.ok)throw new Error(res.status);
    const geo=await res.json();
    state.allFeatures=Array.isArray(geo.features)?geo.features:[];
    fillSelect(document.getElementById("countryFilter"),uniqueSorted(state.allFeatures.map(f=>(f.properties||{}).country)));
    fillSelect(document.getElementById("causeFilter"),uniqueSorted(state.allFeatures.map(f=>(f.properties||{}).cause)));
    fillSelect(document.getElementById("severityFilter"),uniqueSorted(state.allFeatures.map(f=>(f.properties||{}).severity)));
    fillSelect(document.getElementById("yearFilter"),uniqueSorted(state.allFeatures.map(f=>((f.properties||{}).began||"").slice(0,4))));
    applyFilters();
  }catch(e){document.getElementById("headline").textContent="Could not load flood archive data.";console.error(e)}
})();
</script>
</body>
</html>
