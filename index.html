,"facility_type":"pharmacy","district":"Erbil","longitude":43.9351440469321,"latitude":36.1698945562271},{"name":"\u0635\u064a\u062f\u064a\u0644\u06cc\u0629 \u0628\u0627\u063a\u06cc \u0633\u06d5\u0631\u0648\u06d5\u0631\u0627\u0646","facility_type":"hospital","district":"Erbil","longitude":44.0693493808522,"latitude":36.2109102259403},{"name":"shadnaz pharmacy","facility_type":"pharmacy","district":"Erbil","longitude":43.9610077502785,"latitude":36.1919124747594}];
    const floodZones = {"type":"FeatureCollection","features":[{"type":"Feature","properties":{"zone":"very high"},"geometry":{"type":"Polygon","coordinates":[[[44.06,36.25],[44.09,36.255],[44.115,36.22],[44.115,36.175],[44.08,36.145],[44.055,36.165],[44.04,36.205],[44.045,36.235],[44.06,36.25]]]}},{"type":"Feature","properties":{"zone":"high"},"geometry":{"type":"Polygon","coordinates":[[[44.02,36.3],[44.07,36.315],[44.12,36.275],[44.14,36.225],[44.13,36.14],[44.08,36.105],[44.015,36.13],[43.995,36.22],[44.02,36.3]]]}}]};
    const dec2021Zone = {"type":"Feature","properties":{"event":"December 2021 flood"},"geometry":{"type":"Polygon","coordinates":[[[44.005,36.225],[44.04,36.235],[44.06,36.205],[44.055,36.175],[44.025,36.165],[44.0,36.19],[44.005,36.225]]]}};

    const censusTotal = 2517534;
    const erbilCentral = 1288538;
    const remaining = 1228996;

    const districtColor = (density, breaks) => {
      if (density <= breaks[0]) return getComputedStyle(document.documentElement).getPropertyValue('--district-1').trim();
      if (density <= breaks[1]) return getComputedStyle(document.documentElement).getPropertyValue('--district-2').trim();
      if (density <= breaks[2]) return getComputedStyle(document.documentElement).getPropertyValue('--district-3').trim();
      return getComputedStyle(document.documentElement).getPropertyValue('--district-4').trim();
    };

    function buildDistrictPopulation() {
      const features = districts.features;
      const erbil = features.find(f => f.properties.district_name === 'Erbil');
      if (erbil) erbil.properties.population_2024 = erbilCentral;

      const others = features.filter(f => f.properties.district_name !== 'Erbil');
      const femaleSum = others.reduce((s, f) => s + Number(f.properties.female_pop || 0), 0);

      let assigned = 0;
      others.forEach((f, idx) => {
        let pop = Math.round(remaining * (Number(f.properties.female_pop || 0) / femaleSum));
        if (idx === others.length - 1) pop = remaining - assigned;
        assigned += pop;
        f.properties.population_2024 = pop;
      });

      const totalCheck = features.reduce((s, f) => s + Number(f.properties.population_2024 || 0), 0);
      if (totalCheck !== censusTotal) {
        const diff = censusTotal - totalCheck;
        if (erbil) erbil.properties.population_2024 += diff;
      }

      features.forEach(f => {
        const area = Number(f.properties.area_sqkm || 1);
        const pop = Number(f.properties.population_2024 || 0);
        f.properties.pop_density = pop / area;
      });
    }

    function isInsideFloodZone(lon, lat) {
      const pt = turf.point([lon, lat]);
      return floodZones.features.some(zone => turf.booleanPointInPolygon(pt, zone));
    }

    function markerRadius(type) {
      const t = String(type || '').toLowerCase();
      if (t.includes('hospital')) return 7;
      return 4.6;
    }

    buildDistrictPopulation();

    const map = L.map('map', { zoomControl: true, attributionControl: true });
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 18,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    const densities = districts.features.map(f => f.properties.pop_density).sort((a, b) => a - b);
    const breaks = [densities[1] || densities[0], densities[3] || densities[1] || densities[0], densities[4] || densities[densities.length - 1]];

    const districtLayer = L.geoJSON(districts, {
      style: f => ({
        color: '#8c9bac',
        weight: 1,
        fillColor: districtColor(f.properties.pop_density, breaks),
        fillOpacity: 0.58
      })
    }).addTo(map);

    L.geoJSON(floodZones, {
      style: f => {
        const veryHigh = String(f.properties.zone || '').toLowerCase().includes('very');
        return {
          color: veryHigh ? '#8f2018' : '#b64928',
          weight: 1,
          fillColor: veryHigh ? '#ca3b2d' : '#ef8a62',
          fillOpacity: 0.45
        };
      }
    }).addTo(map);

    const districtPop = Object.fromEntries(districts.features.map(f => [f.properties.district_name, Number(f.properties.population_2024 || 0)]));

    let insideCount = 0;
    const insideDistricts = new Set();
    let decInsideCount = 0;
    const decDistricts = new Set();

    const decPoint = turf.centroid(dec2021Zone).geometry.coordinates;

    facilities.forEach(row => {
      const lon = Number(row.longitude);
      const lat = Number(row.latitude);
      if (!Number.isFinite(lon) || !Number.isFinite(lat)) return;

      const inside = isInsideFloodZone(lon, lat);
      const point = turf.point([lon, lat]);
      const inDec = turf.booleanPointInPolygon(point, dec2021Zone);

      if (inside) {
        insideCount += 1;
        insideDistricts.add(row.district);
      }
      if (inDec) {
        decInsideCount += 1;
        decDistricts.add(row.district);
      }

      const marker = L.circleMarker([lat, lon], {
        radius: markerRadius(row.facility_type),
        color: inside ? '#7f0000' : '#56677a',
        weight: 1,
        fillColor: inside ? '#7f0000' : '#6f7d8a',
        fillOpacity: 0.9
      }).addTo(map);

      marker.bindTooltip(
        `<div class="facility-tip"><strong>${row.name || 'Unnamed facility'}</strong><br/>Type: ${row.facility_type || 'unknown'}<br/>Status: ${inside ? 'inside flood zone' : 'outside flood zone'}</div>`,
        { sticky: true, direction: 'top' }
      );
    });

    const servedPopulation = Array.from(insideDistricts).reduce((sum, d) => sum + (districtPop[d] || 0), 0);
    const headline = `${insideCount.toLocaleString()} health facilities serving ${servedPopulation.toLocaleString()} people sit inside Erbil's high flood-risk zones`;
    document.getElementById('headline').textContent = headline;

    map.fitBounds(districtLayer.getBounds().pad(0.03));

    let annotationText;
    if (decInsideCount > 0) {
      const decPopulation = Array.from(decDistricts).reduce((sum, d) => sum + (districtPop[d] || 0), 0);
      annotationText = `December 2021 flood zone. ${decInsideCount} facilities. ${decPopulation.toLocaleString()} residents. 12 deaths.`;
    } else {
      const byDistrict = {};
      facilities.forEach(r => {
        const lon = Number(r.longitude), lat = Number(r.latitude);
        if (!Number.isFinite(lon) || !Number.isFinite(lat)) return;
        if (isInsideFloodZone(lon, lat)) byDistrict[r.district] = (byDistrict[r.district] || 0) + 1;
      });
      const fallbackDistrict = Object.entries(byDistrict).sort((a, b) => b[1] - a[1])[0]?.[0] || 'Erbil';
      annotationText = `Largest at-risk cluster in ${fallbackDistrict} district.`;
    }

    const labelPos = [decPoint[1] + 0.03, decPoint[0] + 0.05];
    const annoIcon = L.divIcon({
      className: '',
      html: `<div class="anno">${annotationText}</div>`,
      iconSize: [240, 70],
      iconAnchor: [0, 70]
    });

    L.marker(labelPos, { icon: annoIcon, interactive: false }).addTo(map);
    L.polyline([[labelPos[0] - 0.005, labelPos[1] + 0.002], [decPoint[1], decPoint[0]]], {
      color: '#b65f2b',
      weight: 1.5,
      dashArray: '4,4'
    }).addTo(map);
  </script>
